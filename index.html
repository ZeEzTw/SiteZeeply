<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeeply | Choose Your World</title>
    <meta name="description" content="Zeeply Studio — 3D Printed Collectibles & Handcrafted Crochet Creations. Elevate Your Reality.">
    <meta property="og:title" content="Zeeply | Modern Collective">
    <meta property="og:description" content="Exclusive collection of 3D printed collectibles and handcrafted crochet creations.">
    <meta property="og:image" content="Logo/logo.webp">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" type="image/webp" href="Logo/logo.webp">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dist.css">
    <script data-goatcounter="https://zeeply.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }
        h1, h2, h3, .heading-font {
            font-family: 'Montserrat', sans-serif;
        }

        .selector-page {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
        }

        /* Logo header */
        .selector-header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem 1rem;
            flex-shrink: 0;
        }
        .selector-header img {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Brand name + tagline */
        .selector-brand {
            text-align: center;
            padding: 0.5rem 1rem 1.5rem;
            flex-shrink: 0;
        }
        .selector-brand h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            animation: fadeInUp 1s ease-out forwards;
        }
        .selector-brand p {
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            color: #999;
            text-transform: uppercase;
            margin-top: 0.5rem;
            animation: fadeInUp 1s ease-out 0.2s forwards;
            opacity: 0;
        }

        /* Two-panel selector */
        .selector-panels {
            display: flex;
            flex: 1;
            min-height: 0;
            gap: 2px;
            padding: 0 1rem 1rem;
        }

        .selector-panel {
            flex: 1;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #fff;
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .panel-3d {
            background: #0a0a0a;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .panel-wool {
            background: #fafafa;
            color: #111;
            border: 1px solid rgba(0,0,0,0.08);
        }

        .selector-panel:hover {
            flex: 1.3;
        }
        .selector-panel:not(:hover) {
            flex: 0.85;
        }
        /* When nothing is hovered, reset */
        .selector-panels:not(:hover) .selector-panel {
            flex: 1;
        }

        .panel-icon {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.4s forwards;
        }

        .panel-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.5s forwards;
        }

        .panel-subtitle {
            font-size: 0.65rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.6s forwards;
        }
        .panel-3d .panel-subtitle { color: #666; }
        .panel-wool .panel-subtitle { color: #888; }

        .panel-cta {
            margin-top: 1.5rem;
            padding: 0.75rem 2rem;
            font-size: 0.6rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            font-weight: 600;
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.7s forwards;
        }
        .panel-3d .panel-cta {
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
        }
        .panel-3d:hover .panel-cta {
            background: #fff;
            color: #000;
        }
        .panel-wool .panel-cta {
            border: 1px solid rgba(0,0,0,0.3);
            color: #111;
        }
        .panel-wool:hover .panel-cta {
            background: #111;
            color: #fff;
        }

        /* Decorative line between panels */
        .panel-divider {
            width: 2px;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.1), transparent);
            flex-shrink: 0;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile adjustments */
        @media (max-width: 640px) {
            .selector-brand h1 { font-size: 1.8rem; }
            .selector-brand p { font-size: 0.6rem; }
            .selector-panels { flex-direction: column; gap: 2px; }
            .selector-panel:hover { flex: 1.2; }
            .selector-panel:not(:hover) { flex: 0.9; }
            .selector-panels:not(:hover) .selector-panel { flex: 1; }
            .panel-title { font-size: 1.2rem; }
            .panel-icon { font-size: 2rem; margin-bottom: 1rem; }
            .panel-divider { width: auto; height: 2px; background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent); }
            .selector-header { padding: 1.5rem 1rem 0.5rem; }
            .selector-header img { width: 48px; height: 48px; }
            .selector-brand { padding: 0.25rem 1rem 1rem; }
        }
    </style>
</head>
<body>

    <div class="selector-page">
        <!-- Header -->
        <div class="selector-header">
            <img src="Logo/logo.webp" alt="ZEEPLY">
        </div>

        <!-- Brand -->
        <div class="selector-brand">
            <h1>Zeeply</h1>
            <p>Choose Your World</p>
        </div>

        <!-- Two Panels -->
        <div class="selector-panels">
            <a href="./3d/" class="selector-panel panel-3d" data-goatcounter-click="selector-3d">
                <div class="panel-icon">&#9670;</div>
                <div class="panel-title">Zeeply 3D</div>
                <div class="panel-subtitle">Printed Creations</div>
                <div class="panel-cta">Explore Collection</div>
            </a>

            <div class="panel-divider"></div>

            <a href="./wool/" class="selector-panel panel-wool" data-goatcounter-click="selector-wool">
                <div class="panel-icon">&#10084;</div>
                <div class="panel-title">Zeeply Wool</div>
                <div class="panel-subtitle">Handcrafted Crochet</div>
                <div class="panel-cta">Explore Collection</div>
            </a>
        </div>
    </div>

</body>
</html>
