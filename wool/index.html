<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeeply Wool | Handcrafted Crochet</title>
    <meta name="description" content="Zeeply Wool — Handcrafted crochet creations made with love. Amigurumi toys, characters, and unique gifts. Made in Romania.">
    <meta property="og:title" content="Zeeply Wool | Handcrafted Crochet">
    <meta property="og:description" content="Handcrafted crochet creations. Amigurumi toys and characters made with premium velvet yarn.">
    <meta property="og:image" content="../Logo/logo.webp">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" type="image/webp" href="../Logo/logo.webp">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../dist.css">
    <link rel="stylesheet" href="style-wool.css">
    <script data-goatcounter="https://zeeply.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</head>
<body class="overflow-x-hidden">

    <!-- Navigation -->
    <nav class="fixed top-0 left-0 w-full z-50 h-20 flex justify-between items-stretch bg-white/90 backdrop-blur-md border-b border-gray-100">
        <a href="#" class="flex items-center px-4 md:px-8 shrink-0" data-goatcounter-click="wool-nav-logo">
            <div class="w-12 h-12 md:w-16 md:h-16 rounded-full overflow-hidden border border-black/10">
                <img src="../Logo/logo.webp" alt="ZEEPLY" class="w-full h-full object-cover">
            </div>
        </a>

        <!-- Center: Cross-nav button -->
        <a href="../3d/" class="group flex items-center gap-2 px-6 md:px-10 hover:bg-black transition-all duration-500" data-goatcounter-click="wool-crossnav-3d">
            <span class="text-[9px] md:text-[11px] uppercase tracking-[0.25em] text-gray-500 group-hover:text-white transition-colors duration-300">Zeeply 3D</span>
            <svg class="w-3 h-3 text-gray-400 group-hover:text-white group-hover:translate-x-0.5 transition-all duration-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
        </a>

        <div class="flex items-center space-x-3 md:space-x-8 text-[10px] md:text-sm uppercase tracking-widest text-gray-800 px-4 md:px-8">
            <a href="#products" id="nav-shop" class="hover:text-gray-400 transition" data-goatcounter-click="wool-nav-shop">Shop</a>
            <a href="../about/" class="hover:text-gray-400 transition" data-goatcounter-click="wool-nav-about">About</a>

            <div class="flex items-center gap-3 md:gap-4 border-l border-black/10 pl-3 md:pl-8 ml-1 md:ml-4">
                <a href="https://www.instagram.com/thread.ntales/" target="_blank" class="hover:text-gray-400 transition text-gray-700" aria-label="Instagram" data-goatcounter-click="wool-nav-instagram">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
                </a>
                <a href="https://www.tiktok.com/@.zeeply" target="_blank" class="hover:text-gray-400 transition text-gray-700" aria-label="TikTok" data-goatcounter-click="wool-nav-tiktok">
                    <svg fill="currentColor" width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"/></svg>
                </a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="relative h-screen w-full flex items-center justify-center overflow-hidden bg-white">
        <div class="absolute inset-0 bg-gradient-to-b from-rose-50/50 via-white to-white"></div>
        <div class="relative z-10 text-center px-6">
            <h1 class="text-5xl md:text-8xl font-bold tracking-tighter mb-4 animate-fade-in uppercase text-gray-900">Zeeply Wool</h1>
            <p class="text-sm md:text-xl font-light tracking-[0.2em] md:tracking-widest text-gray-500 animate-fade-in">Handcrafted with Love</p>
            <a href="#products" id="discover-btn" class="mt-8 inline-block px-8 py-3 md:px-10 md:py-4 border border-gray-900 text-gray-900 text-[10px] md:text-xs uppercase tracking-[0.3em] hover:bg-gray-900 hover:text-white transition duration-500 animate-fade-in" data-goatcounter-click="wool-hero-discover">Discover Collection</a>
        </div>
        <div class="absolute bottom-0 left-0 w-full h-32 wool-gradient-overlay"></div>
    </section>

    <!-- Product Grid Section -->
    <section id="products" class="py-24 px-4 md:px-20 bg-white min-h-screen">
        <div class="max-w-[1400px] mx-auto">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 space-y-6 md:space-y-0">
                <div>
                    <span id="collection-subtitle" class="text-[10px] md:text-xs uppercase tracking-[0.2em] md:tracking-[0.4em] text-gray-400 mb-2 block">Handmade Collection</span>
                    <h2 id="collection-title" class="text-3xl md:text-4xl font-semibold heading-font uppercase text-gray-900">All Creations</h2>
                    <div class="mt-8 inline-block px-8 py-3 border border-rose-300/40 bg-rose-50/50 rounded-full">
                        <span class="text-[12px] md:text-base text-rose-400 font-semibold uppercase tracking-[0.3em]">Transport gratuit la comenzi de peste 50 LEI</span>
                    </div>
                </div>
                <!-- Category Tabs -->
                <div class="flex flex-wrap gap-3 md:gap-4 text-[10px] md:text-xs uppercase tracking-widest" id="category-tabs">
                    <button class="tab-btn active text-gray-900 border-b-2 border-gray-900 pb-1" data-category="All" data-goatcounter-click="wool-filter-all">All</button>
                    <button class="tab-btn text-gray-400 hover:text-gray-900 transition pb-1" data-category="Trending" data-goatcounter-click="wool-filter-trending">Trending</button>
                </div>
            </div>

            <div id="product-grid" class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-3 gap-x-8 gap-y-16">
                <!-- Products dynamically injected via script.js -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="py-20 px-6 md:px-10 border-t border-gray-100 text-center bg-white">
        <div class="text-[9px] md:text-[10px] tracking-[0.2em] md:tracking-[0.5em] text-gray-400 uppercase mb-8">&copy; 2026 ZEEPLY STUDIO</div>
        <div class="flex justify-center space-x-8 md:space-x-12">
            <a href="https://www.instagram.com/thread.ntales/" target="_blank" class="text-[10px] text-gray-400 hover:text-gray-900 transition tracking-widest" data-goatcounter-click="wool-footer-instagram">INSTAGRAM</a>
            <a href="../about/" class="text-[10px] text-gray-400 hover:text-gray-900 transition tracking-widest" data-goatcounter-click="wool-footer-about">ABOUT</a>
            <a href="../terms/" class="text-[10px] text-gray-400 hover:text-gray-900 transition tracking-widest" data-goatcounter-click="wool-footer-terms">TERMENI</a>
            <a href="../shipping/" class="text-[10px] text-gray-400 hover:text-gray-900 transition tracking-widest" data-goatcounter-click="wool-footer-shipping">LIVRARE</a>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="products.js"></script>
    <script src="script.js"></script>
</body>
</html>
