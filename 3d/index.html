<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeeply 3D | Printed Creations</title>
    <meta name="description" content="Zeeply 3D — Exclusive collection of custom gaming keycaps, F1 memorabilia, Stranger Things collectibles, and personalized frames. Handcrafted in Romania.">
    <meta property="og:title" content="Zeeply 3D | Printed Creations">
    <meta property="og:description" content="Exclusive collection of custom gaming keycaps, F1 memorabilia, and handcrafted collectibles. Elevate Your Reality.">
    <meta property="og:image" content="../Logo/logo.webp">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" type="image/webp" href="../Logo/logo.webp">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../dist.css">
    <link rel="stylesheet" href="../style.css">
    <script data-goatcounter="https://zeeply.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</head>
<body class="overflow-x-hidden">

    <!-- Navigation -->
    <nav class="fixed top-0 left-0 w-full z-50 flex justify-between items-stretch bg-transparent backdrop-blur-[2px] bg-black/10">
        <a href="#" class="flex items-center px-4 md:px-10 py-3 md:py-4 shrink-0" data-goatcounter-click="nav-logo">
            <div class="w-10 h-10 md:w-14 md:h-14 rounded-full overflow-hidden border border-white/10">
                <img src="../Logo/logo.webp" alt="ZEEPLY" class="w-full h-full object-cover">
            </div>
        </a>

        <!-- Center: Cross-nav button -->
        <a href="../wool/" class="group flex items-center gap-2 px-6 md:px-12 hover:bg-rose-50 transition-all duration-500" data-goatcounter-click="3d-crossnav-wool">
            <span class="text-[9px] md:text-[11px] uppercase tracking-[0.2em] text-gray-400 group-hover:text-rose-600 transition-colors duration-300">Zeeply Wool</span>
            <svg class="w-3 h-3 text-gray-500 group-hover:text-rose-600 group-hover:translate-x-0.5 transition-all duration-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
        </a>

        <div class="flex items-center space-x-3 md:space-x-8 text-[10px] md:text-sm uppercase tracking-widest px-4 md:px-10">
            <a href="#products" id="nav-shop" class="hover:text-gray-400 transition" data-goatcounter-click="nav-shop">Shop</a>
            <a href="../about/" class="hover:text-gray-400 transition" data-goatcounter-click="nav-about">About</a>

            <div class="flex items-center gap-3 md:gap-4 border-l border-white/20 pl-3 md:pl-8 ml-1 md:ml-4">
                <a href="https://www.instagram.com/zeepl.y/" target="_blank" class="hover:text-gray-400 transition" aria-label="Instagram" data-goatcounter-click="nav-instagram">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
                </a>
                <a href="https://www.tiktok.com/@.zeeply" target="_blank" class="hover:text-gray-400 transition" aria-label="TikTok" data-goatcounter-click="nav-tiktok">
                    <svg fill="currentColor" width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"/></svg>
                </a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="relative h-screen w-full flex items-center justify-center overflow-hidden">
        <video autoplay muted loop playsinline class="hero-video">
            <source src="../SiteVideo/hero.mp4" type="video/mp4">
        </video>
        <div class="relative z-10 text-center px-6">
            <h1 class="text-5xl md:text-8xl font-bold tracking-tighter mb-4 animate-fade-in uppercase">Zeeply 3D</h1>
            <p class="text-sm md:text-xl font-light tracking-[0.2em] md:tracking-widest text-gray-300 animate-fade-in">Printed Creations</p>
            <a href="#products" id="discover-btn" class="mt-8 inline-block px-8 py-3 md:px-10 md:py-4 border border-white text-[10px] md:text-xs uppercase tracking-[0.3em] hover:bg-white hover:text-black transition duration-500 animate-fade-in" data-goatcounter-click="hero-discover">Discover Collection</a>
        </div>
        <div class="absolute bottom-0 left-0 w-full h-32 gradient-overlay"></div>
    </section>

    <!-- Product Grid Section -->
    <section id="products" class="py-24 px-4 md:px-20 bg-black min-h-screen">
        <div class="max-w-[1400px] mx-auto">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 space-y-6 md:space-y-0">
                <div>
                    <span id="collection-subtitle" class="text-[10px] md:text-xs uppercase tracking-[0.2em] md:tracking-[0.4em] text-gray-500 mb-2 block">Zeeply Exclusive</span>
                    <h2 id="collection-title" class="text-3xl md:text-4xl font-semibold heading-font uppercase">The Full Collection</h2>
                    <div class="mt-8 inline-block px-8 py-3 border border-amber-500/30 bg-amber-500/5 rounded-full shadow-[0_0_20px_rgba(245,158,11,0.1)]">
                        <span class="text-[12px] md:text-base text-amber-200 font-semibold uppercase tracking-[0.3em]">Transport gratuit la comenzi de peste 50 LEI</span>
                    </div>
                </div>
                <!-- Category Tabs -->
                <div class="flex flex-wrap gap-3 md:gap-4 text-[10px] md:text-xs uppercase tracking-widest" id="category-tabs">
                    <button class="tab-btn active text-white border-b-2 border-white pb-1" data-category="All" data-goatcounter-click="filter-all">All</button>
                    <button class="tab-btn text-gray-500 hover:text-white transition pb-1" data-category="Trending" data-goatcounter-click="filter-trending">Trending</button>
                    <button class="tab-btn text-gray-500 hover:text-white transition pb-1" data-category="Flori" data-goatcounter-click="filter-flori">Flori</button>
                    <button class="tab-btn text-gray-500 hover:text-white transition pb-1" data-category="Keycaps" data-goatcounter-click="filter-keycaps">Keycaps</button>
                    <button class="tab-btn text-gray-500 hover:text-white transition pb-1" data-category="F1" data-goatcounter-click="filter-f1">F1</button>
                    <button class="tab-btn text-gray-500 hover:text-white transition pb-1" data-category="Stranger Things" data-goatcounter-click="filter-stranger-things">Stranger Things</button>
                    <button class="tab-btn text-gray-500 hover:text-white transition pb-1" data-category="Big Products" data-goatcounter-click="filter-big-products">Big Products</button>
                </div>
            </div>

            <div id="product-grid" class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-4 gap-x-8 gap-y-16">
                <!-- Products dynamically injected via script.js -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="py-20 px-6 md:px-10 border-t border-gray-900 text-center bg-black">
        <div class="text-[9px] md:text-[10px] tracking-[0.2em] md:tracking-[0.5em] text-gray-600 uppercase mb-8">&copy; 2026 ZEEPLY STUDIO</div>
        <div class="flex justify-center space-x-8 md:space-x-12">
            <a href="https://www.instagram.com/zeepl.y/" target="_blank" class="text-[10px] text-gray-400 hover:text-white transition tracking-widest" data-goatcounter-click="footer-instagram">INSTAGRAM</a>
            <a href="../about/" class="text-[10px] text-gray-400 hover:text-white transition tracking-widest" data-goatcounter-click="footer-about">ABOUT</a>
            <a href="../terms/" class="text-[10px] text-gray-400 hover:text-white transition tracking-widest" data-goatcounter-click="footer-terms">TERMENI</a>
            <a href="../shipping/" class="text-[10px] text-gray-400 hover:text-white transition tracking-widest" data-goatcounter-click="footer-shipping">LIVRARE</a>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="products.js"></script>
    <script src="script.js"></script>
</body>
</html>
